background {
    monitor =
    path = /home/Vadim/Изображения/Backgrounds/shaded_landscape.png
    color = rgba(25, 20, 20, 1.0)
    blur_passes = 2
}

# ПОЛЕ ВВОДА
input-field {
    monitor =
    size = 250, 50
    outline_thickness = 3
    dots_size = 0.2
    dots_spacing = 0.15
    dots_center = true
    outer_color = rgba(33ccffee) rgba(00ff99ee) 45deg
    inner_color = rgba(0, 0, 0, 0.0)
    font_color = rgb(143, 143, 143)
    fade_on_empty = false
    placeholder_text = <i>Введите пароль...</i>
    hide_input = false
    rounding = 15
    check_color = rgba(00ff99ee) rgba(ff6633ee) 120deg
    fail_color = rgba(ff6633ee) rgba(ff0066ee) 40deg
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>

    position = 0, -120
    halign = center
    valign = center
}

# ЧАСЫ
label {
    monitor =
    text = $TIME
    color = rgba(200, 200, 200, 1.0)
    font_size = 90
    font_family = Noto Sans Bold
    position = 0, 140
    halign = center
    valign = center
}

# ДАТА
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%A, %d %B")"
    color = rgba(200, 200, 200, 1.0)
    font_size = 24
    font_family = Noto Sans
    position = 0, 40
    halign = center
    valign = center
}

